<body>
    <main id="container" role="main">
        <canvas id="backcanvas" aria-hidden="true"></canvas>
        <canvas id="canvas" aria-label="Game board"></canvas>
        
        <section id="load" aria-live="polite" aria-label="読み込み中 screen">
            <h1>読み込み中</h1>
        </section>
        
        <section id="home" aria-label="Game home screen">
            <header>
                <h1>Couch 2048</h1>
            </header>
            <article>
                <h2>How to play:</h2>
                <ul>
                    <li>⭐️ Drag pieces around</li>
                    <li>⭐️ Stack those with the same number</li>
                    <li>⭐️ Get to 2048 to win the game</li>
                    <li>⭐️ REVEL IN GLORY <small>(optional but recommended)</small></li>
                </ul>
            </article>
            <button id="start" type="button" aria-describedby="game-instructions">NEW GAME</button>
            <aside id="menu" aria-label="Game settings">
                <h3>Settings</h3>
                <fieldset>
                    <legend>Audio and Quality Settings</legend>
                    <label for="m">
                        <input type="checkbox" class="opt" id="m" checked>
                        Music
                    </label>
                    <label for="s">
                        <input type="checkbox" class="opt" id="s" checked>
                        Sound FX
                    </label>
                    <label for="q">
                        <input type="checkbox" class="opt" id="q" checked>
                        High Quality
                    </label>
                </fieldset>
            </aside>
        </section>
        
        <section id="end" style="display:none" aria-live="polite" aria-label="Victory screen">
            <header>
                <h1>You win</h1>
            </header>
            <article>
                <p><strong>Let's party!</strong></p>
                <p><small>Success is commemorated; failure merely remembered</small></p>
            </article>
            <button id="reset" type="button">PLAY AGAIN</button>
        </section>
    </main>
    
    <script src="sound.js"></script>
    <script src="couch.js"></script>
